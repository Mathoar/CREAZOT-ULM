# # Production environment override
services:
  php:
    image: ${PHP_DOCKER_IMAGE}
    build:
      context: ./api
      target: frankenphp_prod
    environment:
      APP_ENV: prod
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      APP_SECRET: ${APP_SECRET:-!ChangeMe!}
      CADDY_MERCURE_JWT_SECRET: ${CADDY_MERCURE_JWT_SECRET:-!ChangeMe!}
      MERCURE_PUBLISHER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeMe!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${CADDY_MERCURE_JWT_SECRET:-!ChangeMe!}
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8}
    volumes:
      - ./api/public/images:/srv/api/public/images
      - ./api/public/media:/app/public/media
      - ./api/public/favicon.ico:/srv/api/public/favicon.ico
      - ./api/public/apple-touch-icon.png:/srv/api/public/apple-touch-icon.png
      - caddy_data:/data/caddy
      - caddy_config:/config
  
  pwa:
    image: ${PWA_DOCKER_IMAGE}
    build:
      context: ./pwa
      target: prod
      args:
        AUTH_SECRET: ${AUTH_SECRET:-!ChangeMe!}
        NEXT_PUBLIC_OIDC_SERVER_URL: ${OIDC_SERVER_URL:-http://localhost:8080/realms/demo}
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-!ChangeMe!}
      NEXT_PUBLIC_OIDC_SERVER_URL: ${OIDC_SERVER_URL:-http://localhost:8080/realms/demo}
    volumes:
      - ./api/public/images:/srv/api/public/images:ro
      - ./api/public/favicon.ico:/srv/app/public/favicon.ico
      - ./api/public/apple-touch-icon.png:/srv/app/public/apple-touch-icon.png

  database:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}

  keycloak-database:
    environment:
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-!ChangeMe!}

  keycloak:
    image: ${KEYCLOAK_DOCKER_IMAGE}
    build:
      context: ./helm/api-platform/keycloak/
      target: keycloak
    restart: unless-stopped
    mem_limit: 768m
    environment:
      KC_DB: postgres
      KC_HTTP_RELATIVE_PATH: /oidc
      KEYCLOAK_PRODUCTION: "true"
      KC_DB_URL_HOST: keycloak-database
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-!ChangeMe!}
      KC_DB_URL_DATABASE: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:-!ChangeMe!}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_HOSTNAME_URL: ${KEYCLOAK_HOSTNAME:-http://localhost:8080/} 
      KC_HOSTNAME_ADMIN_URL: ${KEYCLOAK_HOSTNAME:-http://localhost:8080/}
      KC_FEATURES: "scripts"
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      JAVA_OPTS_KC_HEAP: "-Xms256m -Xmx512m"
